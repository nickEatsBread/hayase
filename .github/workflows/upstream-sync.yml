name: Sync upstream Hayase repos

# Each subdirectory in this monorepo (electron/, interface/, torrent-client/,
# native/, capacitor/, free-torrents/, wiki/) mirrors a separate hayase-app
# repo. This workflow pulls upstream changes per-package via git's subtree
# merge strategy and opens a PR for each one with changes.
#
# Each package gets its own PR so they can be reviewed and merged
# independently. Conflicts with our fork's local additions (debrid module,
# Discord RPC toggle, settings injection in HAYASE_INJECT, patched-Electron
# install scripts, etc) won't block other packages from syncing.
#
# Trigger options:
#   - Schedule:           Mondays 08:00 UTC (weekly)
#   - workflow_dispatch:  manual trigger from the Actions tab, optionally
#                         with a single package selector

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to sync (or "all")'
        type: choice
        options:
          - all
          - electron
          - interface
          - torrent-client
          - native
          - capacitor
          - free-torrents
          - wiki
        default: all

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync ${{ matrix.package.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - { name: electron,        repo: hayase-app/electron        }
          - { name: interface,       repo: hayase-app/interface       }
          - { name: torrent-client,  repo: hayase-app/torrent-client  }
          - { name: native,          repo: hayase-app/native          }
          - { name: capacitor,       repo: hayase-app/capacitor       }
          - { name: free-torrents,   repo: hayase-app/free-torrents   }
          - { name: wiki,            repo: hayase-app/wiki            }

    steps:
      # Per-package filter at step level. GitHub Actions doesn't expose the
      # matrix context inside job-level `if:` so we can't filter at the
      # job header - we'd hit "Unrecognized named-value: matrix" at workflow
      # parse time. Instead each step checks this output.
      - name: Determine if this matrix entry should run
        id: selected
        run: |
          INPUT="${{ github.event.inputs.package }}"
          if [[ "${{ github.event_name }}" == "schedule" ]] \
             || [[ "$INPUT" == "all" ]] \
             || [[ "$INPUT" == "${{ matrix.package.name }}" ]]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "go=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping ${{ matrix.package.name }} (manual dispatch selected '$INPUT' instead)."
          fi

      - name: Checkout fork
        if: steps.selected.outputs.go == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Need a fresh token here so the resulting branch push fires
          # the standard PR opening workflow rather than being blocked
          # by the default GITHUB_TOKEN's restrictions on triggering
          # other workflows.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        if: steps.selected.outputs.go == 'true'
        run: |
          git config user.name "nickEatsBread-bot"
          git config user.email "281274910+nickEatsBread@users.noreply.github.com"

      - name: Add upstream remote and fetch
        if: steps.selected.outputs.go == 'true'
        id: fetch
        run: |
          set -euo pipefail
          REMOTE="upstream-${{ matrix.package.name }}"
          URL="https://github.com/${{ matrix.package.repo }}.git"

          if git remote get-url "$REMOTE" >/dev/null 2>&1; then
            git remote set-url "$REMOTE" "$URL"
          else
            git remote add "$REMOTE" "$URL"
          fi

          # Try main first, fall back to master for older repos.
          if git fetch "$REMOTE" main 2>/dev/null; then
            echo "branch=main" >> "$GITHUB_OUTPUT"
          elif git fetch "$REMOTE" master 2>/dev/null; then
            echo "branch=master" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Could not fetch main or master from $URL"
            exit 1
          fi

          UPSTREAM_SHA=$(git rev-parse "$REMOTE/$(cat "$GITHUB_OUTPUT" | grep ^branch= | cut -d= -f2)")
          echo "upstream_sha=$UPSTREAM_SHA" >> "$GITHUB_OUTPUT"
          echo "upstream_short_sha=${UPSTREAM_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Try subtree merge
        if: steps.selected.outputs.go == 'true'
        id: sync
        run: |
          set +e
          REMOTE="upstream-${{ matrix.package.name }}"
          BRANCH="${{ steps.fetch.outputs.branch }}"
          PKG="${{ matrix.package.name }}"

          # First sync of a never-before-merged upstream needs unrelated
          # histories permission - subsequent syncs reuse the merge base.
          EXTRA_FLAGS=""
          if ! git merge-base HEAD "$REMOTE/$BRANCH" >/dev/null 2>&1; then
            EXTRA_FLAGS="--allow-unrelated-histories"
          fi

          # --squash applies upstream changes as a single staged delta -
          # no merge commit, no upstream history pollution. -X subtree=PKG
          # remaps the upstream root onto our PKG/ subdirectory.
          git merge --squash -X "subtree=$PKG" $EXTRA_FLAGS "$REMOTE/$BRANCH"
          MERGE_STATUS=$?

          if [ $MERGE_STATUS -eq 0 ]; then
            if git diff --cached --quiet; then
              echo "result=no-changes" >> "$GITHUB_OUTPUT"
              echo "::notice::$PKG already up to date with $REMOTE/$BRANCH (no diff)."
            else
              echo "result=changes" >> "$GITHUB_OUTPUT"
              # Commit the staged changes so peter-evans can push as a
              # single fast-forward branch with a clean message.
              git commit -m "sync ${PKG} from upstream

          Pulled from ${REMOTE}/${BRANCH} at ${{ steps.fetch.outputs.upstream_short_sha }}.

          Auto-generated by .github/workflows/upstream-sync.yml."
            fi
          else
            echo "result=conflict" >> "$GITHUB_OUTPUT"
            # Capture conflicted files for the error message and abort the
            # merge so the working tree is clean for the next matrix entry.
            CONFLICTS=$(git diff --name-only --diff-filter=U | tr '\n' ' ')
            echo "conflicts=$CONFLICTS" >> "$GITHUB_OUTPUT"
            git merge --abort 2>/dev/null || git reset --hard HEAD
          fi

      - name: Open PR for clean sync
        id: clean_pr
        if: steps.selected.outputs.go == 'true' && steps.sync.outputs.result == 'changes'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: upstream-sync/${{ matrix.package.name }}
          delete-branch: true
          base: main
          title: 'sync ${{ matrix.package.name }} from upstream (${{ steps.fetch.outputs.upstream_short_sha }})'
          body: |
            Automated sync from `${{ matrix.package.repo }}@${{ steps.fetch.outputs.branch }}` (`${{ steps.fetch.outputs.upstream_short_sha }}`).

            Generated by `.github/workflows/upstream-sync.yml` on ${{ github.event_name == 'schedule' && 'schedule' || 'manual dispatch' }}.

            **Auto-merge will trigger automatically** unless `vars.AUTO_MERGE_CLEAN_SYNCS` is set to `false`. Clean syncs (no conflicts) are low-risk by definition - upstream changed files we don't touch. Disable the auto-merge variable if you want to inspect each one.

            For reference, this fork's local additions that DO get touched would have produced conflicts (caught earlier in the workflow):

            - debrid module in `torrent-client/` (Real-Debrid / AllDebrid / Premiumize / TorBox + localhost HTTP proxy)
            - Discord RPC master toggle in `electron/src/main/discord.ts`
            - Settings injection in `electron/src/main/app.ts` (`HAYASE_INJECT` block, `injectDebrid` / `injectRpcMaster` / `injectCheckUpdate`)
            - Patched-Electron install scripts in `scripts/install-patched-electron.mjs`
            - `electronDist` config in `electron/electron-builder.yml`
            - after-pack hooks for ffmpeg + bundle-trim cleanup in `electron/scripts/after-pack.mjs`

      # Clean syncs are low risk (upstream changed files we don't touch)
      # so they auto-merge by default. Opt out by setting the repo variable
      # AUTO_MERGE_CLEAN_SYNCS to anything other than 'true' (or leaving it
      # unset and changing the default below to 'false').
      #
      # Requires "Allow auto-merge" in repo Settings -> General. Without
      # branch protection or required checks, --merge fires immediately.
      # The --auto flag queues if any required-check waiting is needed.
      - name: Auto-merge clean sync PR
        if: steps.clean_pr.outputs.pull-request-number && (vars.AUTO_MERGE_CLEAN_SYNCS == '' || vars.AUTO_MERGE_CLEAN_SYNCS == 'true')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ steps.clean_pr.outputs.pull-request-number }}"
          echo "Auto-merging clean sync PR #$PR_NUM..."
          # --merge keeps the squash-style single commit peter-evans created.
          # --delete-branch cleans up upstream-sync/PKG after merge.
          # || true: don't fail the matrix entry if auto-merge can't enable
          # (e.g. branch protection requires reviewers; the PR stays open
          # for manual handling).
          gh pr merge "$PR_NUM" --merge --delete-branch --auto || \
          gh pr merge "$PR_NUM" --merge --delete-branch || \
          echo "::warning::Could not auto-merge PR #$PR_NUM - leaving open for manual review"

      # When `git merge --squash` produces conflicts, this step replays the
      # merge (the previous step aborted to keep the worktree clean) and
      # shells out to scripts/ai-resolve-conflicts.mjs to resolve every
      # conflicted file via an LLM. Four auth modes, picked in priority
      # order from the secrets that exist (override with AI_RESOLVE_MODE
      # repo variable):
      #   1. workers-ai     CF_WORKERS_AI_TOKEN + CF_WORKERS_AI_ACCOUNT_ID
      #                     FREE up to 10k neurons/day (Qwen2.5-Coder-32B
      #                     by default, configurable via CF_WORKERS_AI_MODEL)
      #   2. cf-unified     CF_AI_GATEWAY_TOKEN + CF_AI_GATEWAY_URL
      #                     PAID via Cloudflare credits, gets you Claude Opus
      #   3. cf-byok        ANTHROPIC_API_KEY + CF_AI_GATEWAY_URL
      #                     PAID via Anthropic, CF for caching/analytics
      #   4. direct         ANTHROPIC_API_KEY
      #                     PAID via Anthropic, no CF
      #
      # If none of these are configured, the step exits cleanly and falls
      # through to the manual-review path in the next step.
      - name: AI-resolve conflicts via Cloudflare AI Gateway
        if: steps.selected.outputs.go == 'true' && steps.sync.outputs.result == 'conflict'
        id: ai_resolve
        env:
          # Workers AI (free tier) - mode 1
          CF_WORKERS_AI_TOKEN: ${{ secrets.CF_WORKERS_AI_TOKEN }}
          CF_WORKERS_AI_ACCOUNT_ID: ${{ secrets.CF_WORKERS_AI_ACCOUNT_ID }}
          CF_WORKERS_AI_MODEL: ${{ vars.CF_WORKERS_AI_MODEL || '@cf/qwen/qwen2.5-coder-32b-instruct' }}
          # CF AI Gateway (Unified Billing or BYOK) - modes 2/3
          CF_AI_GATEWAY_URL: ${{ secrets.CF_AI_GATEWAY_URL }}
          CF_AI_GATEWAY_TOKEN: ${{ secrets.CF_AI_GATEWAY_TOKEN }}
          # Anthropic direct (or via BYOK above) - modes 3/4
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-opus-4-5' }}
          # Optional override
          AI_RESOLVE_MODE: ${{ vars.AI_RESOLVE_MODE }}
        run: |
          set -e
          # Need at least one valid auth combo to proceed.
          HAS_AUTH=0
          if [ -n "$CF_WORKERS_AI_TOKEN" ] && [ -n "$CF_WORKERS_AI_ACCOUNT_ID" ]; then HAS_AUTH=1; fi
          if [ -n "$CF_AI_GATEWAY_TOKEN" ] && [ -n "$CF_AI_GATEWAY_URL" ]; then HAS_AUTH=1; fi
          if [ -n "$ANTHROPIC_API_KEY" ]; then HAS_AUTH=1; fi
          if [ $HAS_AUTH -eq 0 ]; then
            echo "::notice::No AI auth configured. Set CF_WORKERS_AI_TOKEN+CF_WORKERS_AI_ACCOUNT_ID (free), or CF_AI_GATEWAY_TOKEN+CF_AI_GATEWAY_URL, or ANTHROPIC_API_KEY - skipping AI resolution"
            echo "result=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          REMOTE="upstream-${{ matrix.package.name }}"
          BRANCH="${{ steps.fetch.outputs.branch }}"
          PKG="${{ matrix.package.name }}"

          # Replay the merge - the previous step aborted to leave a clean
          # worktree, but we need the conflict markers back in the files.
          EXTRA_FLAGS=""
          if ! git merge-base HEAD "$REMOTE/$BRANCH" >/dev/null 2>&1; then
            EXTRA_FLAGS="--allow-unrelated-histories"
          fi
          git merge --squash -X "subtree=$PKG" $EXTRA_FLAGS "$REMOTE/$BRANCH" || true

          # Resolve via Claude. Script exits non-zero if any file fails -
          # we set continue-on-error semantics by capturing the exit code.
          set +e
          node scripts/ai-resolve-conflicts.mjs "$PKG" ${{ steps.sync.outputs.conflicts }}
          AI_STATUS=$?
          set -e

          if [ $AI_STATUS -ne 0 ]; then
            echo "::warning::AI resolution failed for one or more files - aborting merge"
            git merge --abort 2>/dev/null || git reset --hard HEAD
            echo "result=ai-failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Stage + commit. The PR step picks up from here.
          git add ${{ steps.sync.outputs.conflicts }}
          # Pick up any other staged changes from the squash merge that
          # weren't conflicted (new files, clean modifications, etc).
          git add .
          if git diff --cached --quiet; then
            echo "::notice::AI resolved conflicts but no net changes - nothing to commit"
            echo "result=ai-noop" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "sync ${PKG} from upstream (AI-resolved)

          Pulled from ${REMOTE}/${BRANCH} at ${{ steps.fetch.outputs.upstream_short_sha }}.

          Conflicts auto-resolved by Claude (${ANTHROPIC_MODEL}) via
          Cloudflare AI Gateway. Resolved files:
          ${{ steps.sync.outputs.conflicts }}

          Auto-generated by .github/workflows/upstream-sync.yml."
          echo "result=ai-resolved" >> "$GITHUB_OUTPUT"

      - name: Open PR for AI-resolved sync
        id: ai_pr
        if: steps.selected.outputs.go == 'true' && steps.ai_resolve.outputs.result == 'ai-resolved'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: upstream-sync-ai/${{ matrix.package.name }}
          delete-branch: true
          base: main
          title: '[AI] sync ${{ matrix.package.name }} from upstream (${{ steps.fetch.outputs.upstream_short_sha }})'
          body: |
            **AI-resolved upstream sync** — conflicts auto-resolved by Claude Opus via Cloudflare AI Gateway.

            Source: `${{ matrix.package.repo }}@${{ steps.fetch.outputs.branch }}` (`${{ steps.fetch.outputs.upstream_short_sha }}`).

            Conflicted files (now resolved):
            ```
            ${{ steps.sync.outputs.conflicts }}
            ```

            **Auto-merge is OFF by default for AI-resolved PRs** because models can silently mis-resolve (drop a fork addition, forget an upstream signature change, etc). Set the repo variable `AUTO_MERGE_AI_PRS=true` to opt into auto-merging these too.

            Cross-check that:

            - Fork features (debrid module, RPC toggle, settings injection, patched-Electron scripts) are still intact
            - Upstream additions (new fields, new methods, signature changes) are incorporated
            - `pnpm --filter hayase build` succeeds before merging (catches type/import regressions)

      # AI-resolved PRs are gated OFF by default - set repo variable
      # AUTO_MERGE_AI_PRS=true to opt in. The model resolution can silently
      # drop fork features or miss upstream signature changes; manual diff
      # review is the safer default until you're confident in the model.
      - name: Auto-merge AI-resolved sync PR
        if: steps.ai_pr.outputs.pull-request-number && vars.AUTO_MERGE_AI_PRS == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ steps.ai_pr.outputs.pull-request-number }}"
          echo "Auto-merging AI-resolved PR #$PR_NUM (AUTO_MERGE_AI_PRS=true)..."
          gh pr merge "$PR_NUM" --merge --delete-branch --auto || \
          gh pr merge "$PR_NUM" --merge --delete-branch || \
          echo "::warning::Could not auto-merge AI-resolved PR #$PR_NUM - leaving open for manual review"

      - name: Report conflict (manual review needed)
        if: steps.selected.outputs.go == 'true' && steps.sync.outputs.result == 'conflict' && steps.ai_resolve.outputs.result != 'ai-resolved'
        run: |
          REASON="manual review needed"
          case "${{ steps.ai_resolve.outputs.result }}" in
            ai-failed)  REASON="AI resolution failed (model declined or output had remaining conflict markers)" ;;
            ai-noop)    REASON="AI resolved conflicts but produced no net changes (likely all hunks were forks-only)" ;;
            skipped)    REASON="AI resolution skipped (no auth configured - set CF_WORKERS_AI_TOKEN+CF_WORKERS_AI_ACCOUNT_ID for free Qwen-Coder, or CF_AI_GATEWAY_TOKEN for paid Opus, or ANTHROPIC_API_KEY)" ;;
          esac

          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## :warning: Sync conflict in \`${{ matrix.package.name }}\`

          The subtree merge from \`${{ matrix.package.repo }}@${{ steps.fetch.outputs.upstream_short_sha }}\` produced conflicts. AI fallback: $REASON.

          **Conflicting files:**
          \`\`\`
          ${{ steps.sync.outputs.conflicts }}
          \`\`\`

          **To resolve locally:**
          \`\`\`bash
          git checkout main
          git pull
          pnpm sync:upstream ${{ matrix.package.name }}
          # ...resolve conflicts in your editor...
          git add <resolved files>
          git commit -m "sync ${{ matrix.package.name }} from upstream"
          git push
          \`\`\`
          EOF

          echo "::warning::Conflict syncing ${{ matrix.package.name }} ($REASON): ${{ steps.sync.outputs.conflicts }}"
          # Don't fail the job - other matrix entries should still attempt
          # their syncs. The summary + warning surface this for the user.

      - name: Note no-op
        if: steps.selected.outputs.go == 'true' && steps.sync.outputs.result == 'no-changes'
        run: echo "::notice::${{ matrix.package.name }} is already current with upstream."
