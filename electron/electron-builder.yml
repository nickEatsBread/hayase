appId: com.github.thaunknown.miru
productName: Hayase
electronFuses:
  resetAdHocDarwinSignature: false
  runAsNode: false
  enableCookieEncryption: true
  enableNodeOptionsEnvironmentVariable: false
  enableNodeCliInspectArguments: false
  enableEmbeddedAsarIntegrityValidation: true
  onlyLoadAppFromAsar: true
directories:
  buildResources: build
asarUnpack:
  - resources/**
  - "**/*.node"
  - node_modules/**/*.node
  - "**/node_modules/**/*.node"
win:
  executableName: Hayase
  files:
    - "!node_modules/**/prebuilds/!(win32*)/*.node"
    - "!**/.vscode/*"
    - "!src/*"
    - "!electron.vite.config.{js,ts,mjs,cjs}"
    - "!{.eslintignore,.eslintrc.js,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}"
    - "!{.env,.env.*,.npmrc,pnpm-lock.yaml}"
    - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}"
    - "!node_modules/**/*.{mk,a,o,h,lib,tlog,cpp,c,vcxproj,vcxproj.filters,props,iobj,ipdb,pdb,exp,recipe,bare,map,ts,txt,cts}"
    - "!node_modules/@thaunknown/yencode/crcutil-1.0/**"
    - "!node_modules/@thaunknown/yencode/build/**"
    - "!node_modules/utp-native/build/**"
    - "!node_modules/utp-native/deps/**"
    - "!node_modules/**/LICENSE"
    - "!**/.eslintcache"
    - "!**/.gitmodules"
    - "!**/.gitattributes"
    - "!**/*.md"
    - "!eslint.config.mjs"
    - "!electron-dist/*"
    - "!resources/*"
    # Aggressive node_modules trim. Most JS packages ship CHANGELOG, test
    # fixtures, source maps, TypeScript sources, doc folders that are dead
    # weight at runtime. Free 1-3 MB inside app.asar.
    - "!**/node_modules/**/{test,tests,__tests__,example,examples,docs,doc,demo,coverage}/**"
    - "!**/node_modules/**/*.{flow,markdown,yaml,yml,xml,html,coffee,svg,d.ts,d.cts,d.mts}"
    - "!**/node_modules/**/{CHANGELOG,HISTORY,AUTHORS,CONTRIBUTORS,NOTICE,SECURITY,UPGRADE,UPGRADING,CODE_OF_CONDUCT,CONTRIBUTING,PATENTS,GOVERNANCE}*"
    - "!**/node_modules/**/{Makefile,gulpfile.js,Gruntfile.js,bower.json,karma.conf.js,jest.config.js,rollup.config.js,vite.config.js,webpack.config.js}"
    - "!**/node_modules/**/.{npmrc,nvmrc,nycrc,prettierrc,eslintrc,babelrc,editorconfig,gitignore,travis.yml,github}*"
    - "!**/node_modules/**/{appveyor.yml,circle.yml,*.test.js,*.spec.js}"
    - "!**/*.map"
  target:
    - target: nsis
      arch:
        - x64
  # signAndEditExecutable: true
  verifyUpdateCodeSignature: false
  artifactName: ${os}-${name}-${version}-installer.${ext}
nsis:
  artifactName: ${os}-${name}-${version}-installer.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  oneClick: false
  perMachine: true
  deleteAppDataOnUninstall: true
  allowToChangeInstallationDirectory: true
mac:
  asarUnpack:
    - resources/**
  artifactName: ${os}-${name}-${version}-mac.${ext}
  entitlementsInherit: build/entitlements.mac.plist
  defaultArch: universal
  singleArchFiles: "**/node_modules/{utp-native,fs-native-extensions,@thaunknown/yencode}/**/*.node"
  x64ArchFiles: "**/node_modules/{utp-native,fs-native-extensions,@thaunknown/yencode}/**/*.node"
  category: public.app-category.video
  darkModeSupport: true
  hardenedRuntime: true
  mergeASARs: false
  files:
    - "!node_modules/@paymoapp/electron-shutdown-handler/**/*.node"
    - "!node_modules/**/prebuilds/!(darwin*)/*.node"
    - "!**/.vscode/*"
    - "!src/*"
    - "!electron.vite.config.{js,ts,mjs,cjs}"
    - "!{.eslintignore,.eslintrc.js,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}"
    - "!{.env,.env.*,.npmrc,pnpm-lock.yaml}"
    - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}"
    - "!node_modules/**/*.{mk,a,o,h,lib,tlog,cpp,c,vcxproj,vcxproj.filters,props,iobj,ipdb,pdb,exp,recipe,bare,map,ts,txt,cts}"
    - "!node_modules/@thaunknown/yencode/crcutil-1.0/**"
    - "!node_modules/@thaunknown/yencode/build/**"
    - "!node_modules/utp-native/build/**"
    - "!node_modules/utp-native/deps/**"
    - "!node_modules/**/LICENSE"
    - "!**/.eslintcache"
    - "!**/.gitmodules"
    - "!**/.gitattributes"
    - "!**/*.md"
    - "!eslint.config.mjs"
    - "!electron-dist/*"
    - "!resources/*"
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: true
  target:
    - target: default
      arch:
        - universal
linux:
  artifactName: ${os}-${name}-${version}-linux.${ext}
  icon: build/icon.icns
  files:
    - "!node_modules/**/prebuilds/!(linux*)/*.node"
    - "!**/.vscode/*"
    - "!src/*"
    - "!electron.vite.config.{js,ts,mjs,cjs}"
    - "!{.eslintignore,.eslintrc.js,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}"
    - "!{.env,.env.*,.npmrc,pnpm-lock.yaml}"
    - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}"
    - "!node_modules/**/*.{mk,a,o,h,lib,tlog,cpp,c,vcxproj,vcxproj.filters,props,iobj,ipdb,pdb,exp,recipe,bare,map,ts,txt,cts}"
    - "!node_modules/@thaunknown/yencode/crcutil-1.0/**"
    - "!node_modules/@thaunknown/yencode/build/**"
    - "!node_modules/utp-native/build/**"
    - "!node_modules/utp-native/deps/**"
    - "!node_modules/**/LICENSE"
    - "!**/.eslintcache"
    - "!**/.gitmodules"
    - "!**/.gitattributes"
    - "!**/*.md"
    - "!eslint.config.mjs"
    - "!electron-dist/*"
    - "!resources/*"
  target:
    - target: deb
      arch:
        - x64
    # - target: pacman
    #   arch:
    #     - x64
    # - target: rpm
    #   arch:
    #     - x64
    - target: AppImage
      arch:
        - x64
  maintainer: ThaUnknown
  category: AudioVideo;Video
  desktop:
    entry:
      Type: "Application"
      Encoding: "UTF-8"
      Name: "Hayase"
      Comment: "Bittorrent streaming software for cats"
      Keywords: "anime"
      Terminal: "false"
      MimeType: "x-scheme-handler/hayase;"
npmRebuild: true
afterPack: ./scripts/after-pack.mjs
publish:
  provider: github
  owner: nickEatsBread
  repo: hayase
  releaseType: release
# Use the Electron from node_modules instead of the cached zip that
# electron-builder downloads via @electron/get.
#
# By default electron-builder fetches its own copy of Electron from the
# official releases (cached at ~/AppData/Local/electron/Cache/electron-
# v<ver>-win32-x64.zip on Windows) and packages from THAT, completely
# ignoring node_modules/electron/dist. This is fine for stock Electron
# but breaks our setup because `pnpm electron:patch` swaps the upstream-
# Hayase patched Electron (with proprietary_codecs=true Chromium media
# stack - AC3/EAC3/HEVC etc) into node_modules/electron/dist. Without
# electronDist set, the patched binaries never made it into the final
# build; we got the cached stock Electron instead.
#
# Pointing electronDist at node_modules/electron/dist makes the builder
# package the patched Electron we installed there. The ffmpeg.dll
# substitution in scripts/after-pack.mjs is now redundant (upstream's
# patched dist already includes the DTS-enabled ffmpeg) but kept as a
# belt-and-suspenders for users who skipped `pnpm electron:patch`.
electronDist: node_modules/electron/dist
protocols:
  - name: hayase
    schemes:
      - hayase
electronLanguages:
  - en-US
